model:
  name: llama3.1:8b
  api_base: http://localhost:11434/v1
  api_key: local
  temperature: 0.2

ollama:
  model_dir: "C:/Users/castl/.ollama/models"
  bin_dir: "C:/Users/castl/AppData/Local/Programs/Ollama"

tools:
  qmllint_path: "D:/Qt/6.8.3/mingw_64/bin/qmllint.exe"

project:
  qml_root: "" # path to QML source root (set before running gap analysis)
  target_exts:
    - .qml
    - .js
    - .mjs
    - .qmltypes

options:
  apply_patch: false

spec:
  # Section headings that contain behavioral requirements (used for gap analysis chunking)
  behavior_headings:
    - "基本動作"
    - "動作"
  # Section headings to skip (e.g. large input/signal tables with no behavior logic)
  skip_headings:
    - "入力"
  # Spec file prefixes to exclude (e.g. changelog files)
  exclude_prefixes:
    - "変更履歴"